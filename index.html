<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF8F3;--ink:#1A1A18;--muted:#6B6B62;--border:#E2DDD4;--accent:#8B5E3C;--accent-light:#F5EDE4;--claimed:#3A6B4A;--claimed-light:#EBF4EE;--claimed-border:#b8d9c2;--white:#FFFFFF;--red:#C0392B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:var(--white);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
header h1{font-family:"Playfair Display",serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:400;letter-spacing:.02em}
header p{font-size:.85rem;color:#aaa;margin-top:2px}
.btn{font-family:"DM Sans",sans-serif;font-size:.875rem;font-weight:500;padding:.55rem 1.25rem;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:white}
.btn-primary:disabled{background:#bbb;cursor:not-allowed}
main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
.stats-bar{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem;padding:1rem 1.25rem;background:white;border:1px solid var(--border);border-radius:10px}
.stat{display:flex;flex-direction:column}
.stat-num{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:700;line-height:1}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.stat-divider{width:1px;background:var(--border);align-self:stretch}
.tabs{display:flex;margin-bottom:2rem;border-bottom:2px solid var(--border)}
.tab-btn{font-family:"DM Sans",sans-serif;font-size:.95rem;font-weight:500;padding:.75rem 1.5rem;background:none;border:none;cursor:pointer;color:var(--muted);position:relative;display:flex;align-items:center;gap:.5rem}
.tab-btn::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:2px;background:transparent}
.tab-btn.active{color:var(--ink)}
.tab-btn.active::after{background:var(--ink)}
.tab-btn.tab-claimed.active{color:var(--claimed)}
.tab-btn.tab-claimed.active::after{background:var(--claimed)}
.tab-count{font-size:.72rem;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--border);color:var(--muted)}
.tab-btn.active .tab-count{background:var(--ink);color:white}
.tab-btn.tab-claimed.active .tab-count{background:var(--claimed);color:white}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
.artwork-card{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.artwork-card.claimed{border-color:var(--claimed-border)}
.artwork-image-wrap{position:relative;background:#F0EDE8;aspect-ratio:4/3;overflow:hidden}
.artwork-image-wrap img{width:100%;height:100%;object-fit:cover}
.badge-id{position:absolute;top:10px;left:10px;background:rgba(26,26,24,.82);color:white;font-size:.7rem;font-weight:500;padding:3px 9px;border-radius:20px;line-height:1}
.badge-claimed-tag{position:absolute;top:10px;right:10px;background:var(--claimed);color:white;font-size:.72rem;font-weight:500;padding:3px 10px;border-radius:20px}
.no-img{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bbb;font-size:.8rem;gap:8px}
.no-img svg{width:36px;height:36px;opacity:.35}
.artwork-body{padding:1rem 1.125rem 1.25rem;display:flex;flex-direction:column;flex:1}
.artwork-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.4rem}
.artwork-title{font-family:"Playfair Display",serif;font-size:1.05rem;font-weight:500;line-height:1.3}
.artwork-desc{font-size:.85rem;color:var(--muted);line-height:1.55;margin-bottom:.75rem;flex:1}
.artwork-date{font-size:.75rem;color:#bbb;margin-bottom:.75rem}
.claim-box{margin-top:auto;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.claim-box-header{background:var(--cream);padding:.5rem .75rem;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border)}
.claim-box-body{padding:.75rem;display:flex;flex-direction:column;gap:.5rem}
.claim-box-body input{width:100%;font-family:"DM Sans",sans-serif;font-size:.875rem;padding:.5rem .75rem;border:1px solid var(--border);border-radius:7px;background:white;color:var(--ink);outline:none}
.btn-save-claim{width:100%;font-family:"DM Sans",sans-serif;font-size:.875rem;font-weight:600;padding:.55rem 1rem;border-radius:7px;background:var(--claimed);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.claimed-info{margin-top:auto;background:var(--claimed-light);border:1px solid var(--claimed-border);border-radius:10px;padding:.75rem}
.claimed-info-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--claimed);margin-bottom:.3rem}
.claimed-info-name{font-size:1rem;font-weight:500;color:var(--ink)}
.btn-unclaim{font-size:.75rem;color:var(--red);background:none;border:none;cursor:pointer;padding:0;font-family:"DM Sans",sans-serif;text-decoration:underline;margin-top:6px;display:block}
.btn-delete{background:none;border:none;cursor:pointer;color:#ccc;padding:2px;border-radius:4px;flex-shrink:0}
.btn-delete:hover{color:var(--red)}
.btn-delete svg{width:16px;height:16px;display:block}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);grid-column:1/-1}
.empty-state svg{width:56px;height:56px;opacity:.25;margin:0 auto 1rem;display:block}
.empty-state h2{font-family:"Playfair Display",serif;font-size:1.4rem;font-weight:400;color:var(--ink);margin-bottom:.5rem}
.section-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.section-header h2{font-family:"Playfair Display",serif;font-size:1.25rem;font-weight:400;color:var(--ink)}
.section-header p{font-size:.85rem;color:var(--muted);margin-top:2px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:14px;width:100%;max-width:520px;margin:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-family:"Playfair Display",serif;font-size:1.2rem;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center}
.modal-body{padding:1.5rem}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:.82rem;font-weight:500;color:var(--ink);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group textarea{width:100%;font-family:"DM Sans",sans-serif;font-size:.9rem;padding:.6rem .85rem;border:1px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);outline:none;resize:vertical}
.form-group textarea{min-height:90px}
.upload-area{border:2px dashed var(--border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;background:var(--cream);position:relative}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-area svg{width:32px;height:32px;color:var(--accent);margin:0 auto 8px;display:block}
.upload-area p{font-size:.85rem;color:var(--muted)}
.upload-area strong{color:var(--accent)}
.upload-preview{margin-top:.75rem;border-radius:8px;overflow:hidden;max-height:200px;display:none}
.upload-preview img{width:100%;object-fit:cover;max-height:200px}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end}
.btn-cancel{background:var(--cream);color:var(--muted);border:1px solid var(--border);font-family:"DM Sans",sans-serif;font-size:.875rem;font-weight:500;padding:.55rem 1.25rem;border-radius:6px;cursor:pointer}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.page-loader{text-align:center;padding:4rem;color:var(--muted);grid-column:1/-1}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:white;font-size:.875rem;padding:.6rem 1.25rem;border-radius:8px;opacity:0;transition:all .25s;pointer-events:none;z-index:2000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){header{padding:1rem 1.25rem}main{padding:1.25rem 1rem}.gallery-grid{grid-template-columns:1fr}.stats-bar{gap:1rem}.stat-divider{display:none}.tab-btn{padding:.75rem 1rem}}
</style>
</head>
<body>
<header>
  <div>
    <h1>Art Gallery</h1>
    <p>Browse and claim available artwork</p>
  </div>
  <button class="btn btn-primary" onclick="openModal()">+ Add Artwork</button>
</header>
<main>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Total Pieces</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num" id="statAvail">0</span><span class="stat-label">Available</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num" id="statClaimed">0</span><span class="stat-label">Claimed</span></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-available" onclick="switchTab('available')">Available <span class="tab-count" id="countAvail">0</span></button>
    <button class="tab-btn tab-claimed" id="tab-claimed" onclick="switchTab('claimed')">Claimed <span class="tab-count" id="countClaimed">0</span></button>
  </div>
  <div id="panel-available">
    <div class="gallery-grid" id="grid-available"><div class="page-loader">Loading gallery...</div></div>
  </div>
  <div id="panel-claimed" style="display:none">
    <div class="section-header"><h2>Claimed Artwork</h2><p>These pieces have been reserved.</p></div>
    <div class="gallery-grid" id="grid-claimed"></div>
  </div>
</main>
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Add New Artwork</h2>
      <button class="modal-close" onclick="closeModal()">X</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Artwork Title</label><input type="text" id="inTitle" placeholder="e.g. Untitled No. 3" /></div>
      <div class="form-group"><label>Description</label><textarea id="inDesc" placeholder="Medium, size, year, notes..."></textarea></div>
      <div class="form-group">
        <label>Photo</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" accept="image/*" id="fileInput" onchange="previewFile(event)" />
          <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
          <p><strong>Click to upload</strong> or drag and drop</p>
        </div>
        <div class="upload-preview" id="preview"><img id="previewImg" src="" alt="Preview" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="btnAdd" onclick="addArtwork()">Add to Gallery</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL = 'https://cosfeksbduckvwzcgdyv.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvc2Zla3NiZHVja3Z3emNnZHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2ODIzNjAsImV4cCI6MjA5NjI1ODM2MH0.lBuVcOKMhKbd0En-Abf98AA1XRkfPFJ_m-RhdltsTVQ
';
var STORAGE_BUCKET = 'artwork-images';
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var allArtworks = [];
 
function switchTab(tab) {
  document.getElementById('tab-available').classList.toggle('active', tab === 'available');
  document.getElementById('tab-claimed').classList.toggle('active', tab === 'claimed');
  document.getElementById('panel-available').style.display = tab === 'available' ? '' : 'none';
  document.getElementById('panel-claimed').style.display = tab === 'claimed' ? '' : 'none';
}
 
async function loadArtworks() {
  var r = await db.from('artworks').select('*').order('id', { ascending: true });
  if (r.error) { showToast('Could not load: ' + r.error.message); return; }
  allArtworks = r.data || [];
  render();
}
 
function render() {
  var available = allArtworks.filter(function(a) { return !a.claimed_by; });
  var claimed = allArtworks.filter(function(a) { return !!a.claimed_by; });
  document.getElementById('statTotal').textContent = allArtworks.length;
  document.getElementById('statAvail').textContent = available.length;
  document.getElementById('statClaimed').textContent = claimed.length;
  document.getElementById('countAvail').textContent = available.length;
  document.getElementById('countClaimed').textContent = claimed.length;
  renderGrid('grid-available', available, false);
  renderGrid('grid-claimed', claimed, true);
}
 
function renderGrid(gridId, list, isClaimed) {
  var grid = document.getElementById(gridId);
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><h2>' + (isClaimed ? 'Nothing claimed yet' : 'No artwork yet') + '</h2><p>' + (isClaimed ? 'Claimed pieces appear here.' : 'Click Add Artwork to get started.') + '</p></div>';
    return;
  }
  grid.innerHTML = list.map(function(a) { return makeCard(a, isClaimed); }).join('');
}
 
function makeCard(a, isClaimed) {
  var img = a.image_url ? '<img src="' + esc(a.image_url) + '" alt="' + esc(a.title) + '" loading="lazy">' : '<div class="no-img"><svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span>No photo</span></div>';
  var date = a.created_at ? new Date(a.created_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '';
  var bottom = isClaimed
    ? '<div class="claimed-info"><div class="claimed-info-label">Claimed by</div><div class="claimed-info-name">' + esc(a.claimed_by) + '</div><button class="btn-unclaim" onclick="doUnclaim(' + a.id + ')">Remove claim</button></div>'
    : '<div class="claim-box"><div class="claim-box-header">Claim this piece</div><div class="claim-box-body"><input type="text" id="ci-' + a.id + '" placeholder="Enter your name..."><button class="btn-save-claim" id="cb-' + a.id + '" onclick="doClaim(' + a.id + ')">Save Claim</button></div></div>';
  return '<div class="artwork-card' + (isClaimed ? ' claimed' : '') + '"><div class="artwork-image-wrap">' + img + '<div class="badge-id">ID ' + a.id + '</div>' + (isClaimed ? '<span class="badge-claimed-tag">Claimed</span>' : '') + '</div><div class="artwork-body"><div class="artwork-title-row"><div class="artwork-title">' + esc(a.title) + '</div><button class="btn-delete" onclick="doDelete(' + a.id + ')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>' + (a.description ? '<p class="artwork-desc">' + esc(a.description) + '</p>' : '<p class="artwork-desc" style="color:#ccc;font-style:italic">No description</p>') + (date ? '<p class="artwork-date">' + date + '</p>' : '') + bottom + '</div></div>';
}
 
async function addArtwork() {
  var title = document.getElementById('inTitle').value.trim();
  var desc = document.getElementById('inDesc').value.trim();
  if (!title) { showToast('Please enter a title'); return; }
  var btn = document.getElementById('btnAdd');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving...';
  try {
    var imageUrl = null;
    var file = document.getElementById('fileInput').files[0];
    if (file) {
      var fname = 'art_' + Date.now() + '.' + file.name.split('.').pop();
      var up = await db.storage.from(STORAGE_BUCKET).upload(fname, file, {cacheControl:'3600',upsert:false});
      if (up.error) throw new Error('Upload failed: ' + up.error.message);
      imageUrl = db.storage.from(STORAGE_BUCKET).getPublicUrl(fname).data.publicUrl;
    }
    var ins = await db.from('artworks').insert([{title:title,description:desc,image_url:imageUrl}]).select().single();
    if (ins.error) throw new Error(ins.error.message);
    allArtworks.push(ins.data);
    allArtworks.sort(function(a,b){return a.id-b.id;});
    closeModal(); render(); switchTab('available');
    showToast('Artwork #' + ins.data.id + ' added!');
  } catch(e) { showToast(e.message); }
  finally { btn.disabled=false; btn.innerHTML='Add to Gallery'; }
}
 
async function doClaim(id) {
  var input = document.getElementById('ci-' + id);
  var name = input ? input.value.trim() : '';
  if (!name) { if(input){input.focus();input.style.borderColor='var(--red)';setTimeout(function(){input.style.borderColor='';},1500);} return; }
  var btn = document.getElementById('cb-' + id);
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  var check = await db.from('artworks').select('claimed_by').eq('id',id).single();
  if (check.data && check.data.claimed_by) { showToast('Already claimed by someone else!'); loadArtworks(); return; }
  var r = await db.from('artworks').update({claimed_by:name}).eq('id',id);
  if (r.error) { showToast('Could not save: ' + r.error.message); if(btn){btn.disabled=false;btn.textContent='Save Claim';} return; }
  var idx = allArtworks.findIndex(function(a){return a.id===id;});
  if (idx !== -1) allArtworks[idx].claimed_by = name;
  render(); switchTab('claimed');
  showToast('Claimed by ' + name + '! Moved to Claimed tab.');
}
 
async function doUnclaim(id) {
  if (!confirm('Remove this claim?')) return;
  var r = await db.from('artworks').update({claimed_by:null}).eq('id',id);
  if (r.error) { showToast('Could not remove claim.'); return; }
  var idx = allArtworks.findIndex(function(a){return a.id===id;});
  if (idx !== -1) allArtworks[idx].claimed_by = null;
  render(); switchTab('available');
  showToast('Claim removed.');
}
 
async function doDelete(id) {
  if (!confirm('Permanently delete this artwork?')) return;
  var art = allArtworks.find(function(a){return a.id===id;});
  if (art && art.image_url) { await db.storage.from(STORAGE_BUCKET).remove([art.image_url.split('/').pop()]); }
  var r = await db.from('artworks').delete().eq('id',id);
  if (r.error) { showToast('Could not delete.'); return; }
  allArtworks = allArtworks.filter(function(a){return a.id!==id;});
  render(); showToast('Artwork deleted.');
}
 
function openModal() { document.getElementById('modalOverlay').classList.add('open'); document.getElementById('inTitle').focus(); }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('inTitle').value=''; document.getElementById('inDesc').value='';
  document.getElementById('fileInput').value=''; document.getElementById('preview').style.display='none';
}
function overlayClick(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function previewFile(e) {
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){ document.getElementById('previewImg').src=ev.target.result; document.getElementById('preview').style.display='block'; };
  reader.readAsDataURL(file);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); }
 
db.channel('artworks').on('postgres_changes',{event:'*',schema:'public',table:'artworks'},function(){loadArtworks();}).subscribe();
loadArtworks();
</script>
</body>
</html>
